<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Islamic Prayer Times</title>

    <style>
        /* Layout */
        :root{
            --bg: #f1f5f9;
            --panel: #ffffff;
            --muted: #64748b;
            --accent: #16a34a;
            --border: #e6eef3;
            --card-shadow: rgba(2,6,23,0.06);
            --radius: 14px;
            --gap: 18px;
        }

        html,body{
            height:100%;
            margin:0;
            font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
            background: var(--bg);
            color:#0f172a;
        }

        .page {
            max-width: 980px;
            margin: 48px auto;
            padding: 0 16px;
        }

        header {
            text-align:center;
            margin-bottom: 32px;
        }

        h1 {
            font-size: 2.2rem;
            margin: 0 0 6px 0;
            color: #047857;
            font-weight: 800;
            line-height: 1.05;
        }

        header p {
            margin: 0;
            color: var(--muted);
            font-size: 0.95rem;
        }

        /* Search panel */
        .search-panel {
            display:flex;
            gap:12px;
            align-items:center;
            background: var(--panel);
            padding: 18px;
            border-radius: 14px;
            border: 1px solid var(--border);
            box-shadow: 0 6px 20px var(--card-shadow);
            margin-bottom: 28px;
            flex-wrap:wrap;
        }

        .search-panel input[type="text"] {
            flex:1 1 200px;
            padding: 12px 14px;
            border-radius: 10px;
            border:1px solid #dbeafe;
            font-size:1rem;
            outline:none;
            transition: box-shadow .15s ease, border-color .15s ease;
            background: #fbfdff;
        }

        .search-panel input[type="text"]:focus {
            box-shadow: 0 6px 18px rgba(6,95,70,0.06);
            border-color: rgba(6,95,70,0.18);
        }

        .btn {
            background: var(--accent);
            color: white;
            padding: 10px 18px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight:700;
            min-width:120px;
            box-shadow: 0 8px 18px rgba(6,95,70,0.12);
            transition: background .14s ease, transform .12s ease;
        }

        .btn:hover { transform: translateY(-2px); background:#15803d; }

        /* Loading / Error */
        #loading { text-align:center; padding:26px 12px; color:var(--muted); }
        .hidden { display:none; }

        #errorMessage {
            background: #fff7f7;
            color: #b91c1c;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 18px;
            border: 1px solid #ffd7d7;
        }

        /* Grid */
        #prayerGrid {
            display:grid;
            grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
            gap:16px;
            margin-top: 6px;
        }

        .prayer-card {
            background: var(--panel);
            padding: 18px;
            border-radius: 12px;
            border:1px solid var(--border);
            box-shadow: 0 10px 32px rgba(2,6,23,0.06);
            text-align:center;
            transition: transform 0.2s ease-in-out, box-shadow .18s ease;
        }

        .prayer-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 18px 40px rgba(2,6,23,0.09);
        }

        .prayer-card h3 {
            font-size: 0.78rem;
            color: var(--muted);
            letter-spacing: 1px;
            margin: 0;
            text-transform: uppercase;
            font-weight:700;
        }

        .prayer-card p {
            margin: 12px 0 0 0;
            font-size: 1.9rem;
            font-weight:800;
            color:#0f172a;
        }

        /* Date / footer */
        #dateInfo {
            margin-top: 18px;
            text-align:center;
            color: var(--muted);
            font-style: italic;
        }

        /* small spinner */
        .spinner {
            display:inline-block;
            width:48px;
            height:48px;
            border-radius:50%;
            border:3px solid rgba(16,185,129,0.12);
            border-bottom-color: var(--accent);
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* responsive tweaks */
        @media (max-width:520px){
            .search-panel { padding:12px; gap:10px; }
            .btn { min-width: 90px; padding:9px 12px; }
            h1 { font-size:1.6rem; }
        }
    </style>
</head>
<body>
    <div class="page">
        <header>
            <h1>Prayer Times</h1>
            <p>Enter your location to see daily prayer schedules</p>
        </header>

        <div id="errorMessage" class="hidden"></div>

        <div class="search-panel">
            <input id="cityInput" type="text" placeholder="City (e.g., London)">
            <input id="countryInput" type="text" placeholder="Country (e.g., UK)">
            <button onclick="handleFetch()" class="btn">Get Times</button>
        </div>

        <div id="loading" class="hidden">
            <div class="spinner" aria-hidden="true"></div>
            <p style="margin-top:12px;color:var(--muted)">Fetching data from Aladhan API...</p>
        </div>

        <div id="prayerGrid" aria-live="polite"></div>

        <footer id="dateInfo"></footer>
    </div>

    <script>
        /**
         * Logic using Promises, Async/Await, and JSON
         */

        async function getPrayerTimes(city, country) {
            const url = `https://api.aladhan.com/v1/timingsByCity?city=${encodeURIComponent(city)}&country=${encodeURIComponent(country)}&method=2`;
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Could not find location. Please check your spelling.');
                const jsonResponse = await response.json();
                return jsonResponse.data;
            } catch (error) {
                throw error;
            }
        }

        async function handleFetch() {
            const city = document.getElementById('cityInput').value.trim();
            const country = document.getElementById('countryInput').value.trim();
            if (!city || !country) { showError("Please enter both city and country."); return; }

            toggleLoading(true);
            hideError();
            clearGrid();

            try {
                const data = await getPrayerTimes(city, country);
                displayResults(data);
            } catch (err) {
                showError(err.message);
            } finally {
                toggleLoading(false);
            }
        }

        function displayResults(data) {
            const grid = document.getElementById('prayerGrid');
            const timings = data.timings;
            const date = data.date;
            const targetPrayers = ['Fajr', 'Sunrise', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];

            targetPrayers.forEach(name => {
                const card = document.createElement('div');
                card.className = 'prayer-card';
                card.innerHTML = `
                    <h3>${name}</h3>
                    <p>${timings[name]}</p>
                `;
                grid.appendChild(card);
            });

            document.getElementById('dateInfo').innerText =
                `Date: ${date.readable} (${date.hijri.day} ${date.hijri.month.en} ${date.hijri.year} AH)`;
        }

        function toggleLoading(isLoading) {
            document.getElementById('loading').classList.toggle('hidden', !isLoading);
        }

        function showError(msg) {
            const errDiv = document.getElementById('errorMessage');
            errDiv.innerText = msg;
            errDiv.classList.remove('hidden');
        }

        function hideError() {
            document.getElementById('errorMessage').classList.add('hidden');
        }

        function clearGrid() {
            document.getElementById('prayerGrid').innerHTML = '';
            document.getElementById('dateInfo').innerText = '';
        }
    </script>
</body>
</html>
